<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin | Gato Miel Estudio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #f3ece3;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.admin-header {
  background: #1a1714;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.admin-header-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  color: white;
  font-weight: 500;
}
.admin-header-sub {
  font-size: 11px;
  color: #c48a3a;
  margin-top: 2px;
}
.btn-salir {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7);
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: 0.2s;
}
.btn-salir:hover { background: rgba(255,255,255,0.15); color: white; }

/* ── TABS ── */
.tabs-bar {
  background: white;
  border-bottom: 1px solid #f0ebe4;
  padding: 0 20px;
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.tab-btn {
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  color: #aaa;
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: 0.2s;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.tab-btn:hover { color: #555; }
.tab-btn.activo { color: #c48a3a; border-bottom-color: #c48a3a; }
.tab-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px; height: 16px;
  background: #e74c3c;
  color: white;
  border-radius: 50%;
  font-size: 9px;
  margin-left: 6px;
  font-weight: 700;
}

/* ── LAYOUT PRINCIPAL ── */
.admin-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 270px;
  background: white;
  border-right: 1px solid #f0ebe4;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-section {
  padding: 12px 16px 8px;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #bbb;
  font-weight: 400;
  border-bottom: 1px solid #faf7f4;
}
.sidebar-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #f0ebe4 transparent;
}

/* Item conversación */
.user-item {
  padding: 12px 14px;
  cursor: pointer;
  border-bottom: 1px solid #faf7f4;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background 0.15s;
  position: relative;
}
.user-item:hover { background: #fdf8f3; }
.user-item.activo { background: #fdf6ec; border-left: 3px solid #c48a3a; padding-left: 11px; }
.user-item.cerrado { opacity: 0.45; }

.user-item img {
  width: 38px; height: 38px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.user-item-info { flex: 1; overflow: hidden; }
.user-item-name {
  font-size: 13px;
  font-weight: 500;
  color: #1a1714;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.user-item-preview {
  font-size: 11px;
  color: #aaa;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}
.user-item-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}
.unread-dot {
  width: 9px; height: 9px;
  background: #e74c3c;
  border-radius: 50%;
}
.estado-tag {
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 500;
  letter-spacing: 0.04em;
}
.estado-tag.abierto { background: #e8f5e9; color: #2e7d32; }
.estado-tag.cerrado { background: #f5f5f5; color: #999; }

.sidebar-empty {
  padding: 30px 16px;
  text-align: center;
  color: #bbb;
  font-size: 12px;
  line-height: 1.7;
}

/* ── CHAT AREA ── */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.chat-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: #bbb;
  font-size: 13px;
  text-align: center;
  line-height: 1.6;
}
.chat-placeholder span { font-size: 44px; }

/* Chat top bar */
.chat-top {
  padding: 12px 18px;
  background: white;
  border-bottom: 1px solid #f0ebe4;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.chat-top img {
  width: 36px; height: 36px;
  border-radius: 50%;
  object-fit: cover;
}
.chat-top-info { flex: 1; }
.chat-top-name { font-size: 14px; font-weight: 500; color: #1a1714; }
.chat-top-email { font-size: 11px; color: #aaa; margin-top: 1px; }

/* Botones acción */
.chat-acciones {
  display: flex;
  gap: 8px;
}
.btn-accion {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: 0.2s;
  letter-spacing: 0.04em;
  border: none;
}
.btn-cerrar-chat {
  background: #fff0f0;
  color: #e74c3c;
  border: 1px solid #ffd5d5;
}
.btn-cerrar-chat:hover { background: #ffe0e0; }
.btn-reabrir-chat {
  background: #f0fdf0;
  color: #2e7d32;
  border: 1px solid #c8e6c9;
}
.btn-reabrir-chat:hover { background: #e0f7e0; }

/* Aviso chat cerrado */
.chat-cerrado-aviso {
  background: #faf7f4;
  border-top: 1px solid #f0ebe4;
  padding: 12px 18px;
  text-align: center;
  font-size: 12px;
  color: #aaa;
  font-style: italic;
}

/* Mensajes */
#admin-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: #faf7f4;
  scrollbar-width: thin;
  scrollbar-color: #f0ebe4 transparent;
}

.chat-msg {
  max-width: 72%;
  padding: 9px 13px;
  border-radius: 14px;
  font-size: 13px;
  line-height: 1.55;
  word-break: break-word;
}
.chat-msg.usuario {
  align-self: flex-start;
  background: white;
  color: #1a1714;
  border: 1px solid #f0ebe4;
  border-bottom-left-radius: 4px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}
.chat-msg.admin {
  align-self: flex-end;
  background: #1a1714;
  color: white;
  border-bottom-right-radius: 4px;
}
.chat-msg-meta {
  font-size: 10px;
  opacity: 0.4;
  margin-top: 3px;
  display: block;
}
.chat-msg.usuario .chat-msg-meta { text-align: left; }
.chat-msg.admin .chat-msg-meta { text-align: right; }

.chat-msg.bot-msg {
  align-self: flex-start;
  background: #fdf6ec;
  color: #c48a3a;
  border: 1px solid #f0e0b8;
  border-bottom-left-radius: 4px;
  font-style: italic;
  font-size: 12px;
}

/* Footer input */
.chat-bottom {
  padding: 10px 14px;
  border-top: 1px solid #f0ebe4;
  background: white;
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
#admin-input {
  flex: 1;
  border: 1.5px solid #f0ebe4;
  border-radius: 20px;
  padding: 9px 14px;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  resize: none;
  outline: none;
  max-height: 80px;
  overflow-y: auto;
  transition: border-color 0.2s;
  line-height: 1.4;
}
#admin-input:focus { border-color: #c48a3a; }
.btn-enviar-admin {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: #c48a3a;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, transform 0.2s;
}
.btn-enviar-admin:hover { background: #a8742f; transform: scale(1.08); }

/* Límite de chats */
.limite-aviso {
  background: #fff8e1;
  border: 1px solid #ffe082;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: #795548;
  margin: 10px 14px 0;
  display: none;
}

/* Botones adjuntar */
.admin-attach-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: #f0ebe4; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.2s;
  font-size: 17px; line-height: 1;
}
.admin-attach-btn:hover, .admin-attach-btn:active { background: #e3d9cc; }
.admin-attach-btn.grabando { background: #e74c3c !important; animation: pulseRec 1s infinite; }
@keyframes pulseRec { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

/* Preview archivo admin */
.admin-preview {
  padding: 8px 14px; background: #f8f5f1;
  border-top: 1px solid #f0ebe4;
  display: none; align-items: center; gap: 8px;
}
.admin-preview img {
  width: 38px; height: 38px; border-radius: 8px; object-fit: cover;
}
.admin-preview-name {
  flex: 1; font-size: 12px; color: #666;
  font-family: 'Inter', sans-serif;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.admin-preview-cancel {
  background: none; border: none; color: #aaa;
  font-size: 16px; cursor: pointer; padding: 0;
}
.admin-preview-cancel:hover { color: #e74c3c; }
/* Emoji picker admin */
.admin-emoji-picker {
  position: absolute;
  bottom: 62px; left: 14px;
  background: white;
  border: 1px solid #f0ebe4;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.13);
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 6px;
  z-index: 9999;
  width: 290px;
}
.admin-emoji-picker.visible { display: flex; }
.emoji-picker-title {
  font-family: 'Playfair Display', serif;
  font-size: 11px; color: #c48a3a;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 2px 4px 4px;
  border-bottom: 1px solid #f5f0ea;
}
.emoji-grid { display: flex; flex-wrap: wrap; gap: 2px; }
.emoji-btn {
  width: 34px; height: 34px;
  background: none; border: none; border-radius: 8px;
  cursor: pointer; font-size: 20px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.emoji-btn:hover { background: #f5f0ea; }
.emoji-section-label {
  font-size: 10px; color: #bbb;
  font-family: 'Inter', sans-serif;
  width: 100%; padding: 4px 2px 1px;
  letter-spacing: 0.05em;
}
</style>

<!-- Inputs ocultos para el admin -->
<input type="file" id="admin-file-input" accept="image/*" style="display:none">
<input type="file" id="admin-audio-input" accept="audio/*" style="display:none">

<style>
#sin-acceso {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  text-align: center;
  padding: 40px;
}
#sin-acceso h2 {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 500;
  color: #1a1714;
}
#sin-acceso p { font-size: 14px; color: #888; line-height: 1.7; }
#sin-acceso a { font-size: 14px; color: #c48a3a; font-weight: 500; text-decoration: none; }
</style>
</style>

</head>
<body>

<!-- Sin acceso -->
<div id="sin-acceso">
  <span style="font-size:44px;">🔒</span>
  <h2>Verificando acceso...</h2>
  <p>Un momento por favor.</p>
</div>

<!-- Panel -->
<div id="panel" style="display:none; flex-direction:column; height:100vh;">

  <div class="admin-header">
    <div style="display:flex;align-items:center;gap:14px;">
      <a href="index.html" style="
        display:flex;align-items:center;gap:6px;
        color:rgba(255,255,255,0.5);text-decoration:none;
        font-size:12px;font-family:'Inter',sans-serif;
        transition:color 0.2s;
      " onmouseover="this.style.color='#c48a3a'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Inicio
      </a>
      <div>
        <div class="admin-header-title">Panel de mensajes</div>
        <div class="admin-header-sub">Gato Miel Estudio</div>
      </div>
    </div>
    <button class="btn-salir" onclick="cerrarSesionAdmin()">Cerrar sesión</button>
  </div>

  <!-- Tabs -->
  <div class="tabs-bar">
    <button class="tab-btn activo" onclick="cambiarTab('abiertos', this)">
      Abiertos <span id="badge-abiertos" class="tab-badge" style="display:none"></span>
    </button>
    <button class="tab-btn" onclick="cambiarTab('cerrados', this)">
      Cerrados
    </button>
    <button class="tab-btn" onclick="cambiarTab('todos', this)">
      Todos
    </button>
  </div>

  <!-- Aviso límite -->
  <div class="limite-aviso" id="limite-aviso">
    ⚠️ Tienes 4 chats abiertos. Cierra uno antes de reabrir otro.
  </div>

  <div class="admin-body">

    <div class="sidebar">
      <div class="sidebar-list" id="sidebar-list">
        <div class="sidebar-empty">Cargando conversaciones...</div>
      </div>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="chat-placeholder" id="chat-placeholder">
        <span>💬</span>
        <p>Selecciona una conversación<br>para responder</p>
      </div>
    </div>

  </div>
</div>


<script type="module">

import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc,
  query, orderBy, where, onSnapshot,
  doc, updateDoc, setDoc, getDoc, getDocs,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const ADMIN_EMAIL = "jhonanibal576@gmail.com";
const MAX_CHATS_ABIERTOS = 4;

const firebaseConfig = {
  apiKey: "AIzaSyBiJkhAd08hv_fjqGMYOvr-vYXudlj5aSs",
  authDomain: "gato-miel-estudio.firebaseapp.com",
  projectId: "gato-miel-estudio",
  storageBucket: "gato-miel-estudio.firebasestorage.app",
  messagingSenderId: "150671559458",
  appId: "1:150671559458:web:6daaf4a78150706db0337b"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let salaActiva = null;
let salaActivaData = null;
let unsubMensajes = null;
let tabActual = "abiertos";
let todasLasSalas = [];

// ── Auth ─────────────────────────────────────────────────────────────
onAuthStateChanged(auth, (user) => {
  const sinAcceso = document.getElementById("sin-acceso");
  const panel = document.getElementById("panel");

  if (!user) {
    sinAcceso.innerHTML = `
      <span style="font-size:44px;">🔒</span>
      <h2>Acceso restringido</h2>
      <p>Debes iniciar sesión como administradora.</p>
      <a href="entrada.html">Iniciar sesión →</a>`;
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    sinAcceso.innerHTML = `
      <span style="font-size:44px;">🚫</span>
      <h2>Sin acceso</h2>
      <p>Esta página es solo para la administradora.</p>
      <a href="index.html">← Volver al inicio</a>`;
    return;
  }

  sinAcceso.style.display = "none";
  panel.style.display = "flex";
  cargarConversaciones();
});

// ── Cargar conversaciones ────────────────────────────────────────────
function cargarConversaciones() {
  const q = query(collection(db, "chats"), orderBy("ultimaFecha", "desc"));
  onSnapshot(q, (snap) => {
    todasLasSalas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderSidebar();
    actualizarBadges();
  });
}

function renderSidebar() {
  const lista = document.getElementById("sidebar-list");

  let filtradas = todasLasSalas;
  if (tabActual === "abiertos") filtradas = todasLasSalas.filter(s => s.estado !== "cerrado");
  if (tabActual === "cerrados") filtradas = todasLasSalas.filter(s => s.estado === "cerrado");

  if (filtradas.length === 0) {
    lista.innerHTML = `<div class="sidebar-empty">
      ${tabActual === "abiertos" ? "No hay chats abiertos 🐱" :
        tabActual === "cerrados" ? "No hay chats cerrados" : "Sin conversaciones aún"}
    </div>`;
    return;
  }

  lista.innerHTML = "";
  filtradas.forEach(sala => {
    const cerrado = sala.estado === "cerrado";
    const div = document.createElement("div");
    div.className = `user-item${salaActiva === sala.id ? " activo" : ""}${cerrado ? " cerrado" : ""}`;
    div.onclick = () => abrirConversacion(sala.id, sala);
    div.innerHTML = `
      <img src="${sala.avatar || 'Assets/Img/Avatares/GatoMiel.jpeg'}"
           onerror="this.src='Assets/Img/Avatares/GatoMiel.jpeg'">
      <div class="user-item-info">
        <div class="user-item-name">${sala.nombreUsuario || sala.email || "Usuario"}</div>
        <div class="user-item-preview">${sala.ultimoMensaje || "Sin mensajes"}</div>
      </div>
      <div class="user-item-meta">
        ${sala.noLeidosAdmin && !cerrado ? '<div class="unread-dot"></div>' : ''}
        <span class="estado-tag ${cerrado ? 'cerrado' : 'abierto'}">${cerrado ? 'Cerrado' : 'Abierto'}</span>
      </div>
    `;
    lista.appendChild(div);
  });
}

function actualizarBadges() {
  const noLeidos = todasLasSalas.filter(s => s.noLeidosAdmin && s.estado !== "cerrado").length;
  const badge = document.getElementById("badge-abiertos");
  if (noLeidos > 0) {
    badge.style.display = "inline-flex";
    badge.textContent = noLeidos;
  } else {
    badge.style.display = "none";
  }
}

// ── Cambiar tab ──────────────────────────────────────────────────────
window.cambiarTab = function(tab, btn) {
  tabActual = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("activo"));
  btn.classList.add("activo");
  renderSidebar();
};

// ── Abrir conversación ───────────────────────────────────────────────
function abrirConversacion(uid, data) {
  salaActiva = uid;
  salaActivaData = data;

  // Marcar leído
  if (data.noLeidosAdmin) {
    updateDoc(doc(db, "chats", uid), { noLeidosAdmin: false });
  }

  renderSidebar();

  const cerrado = data.estado === "cerrado";
  const abiertosCount = todasLasSalas.filter(s => s.estado !== "cerrado").length;

  const area = document.getElementById("chat-area");
  area.innerHTML = `
    <div class="chat-top">
      <img src="${data.avatar || 'Assets/Img/Avatares/GatoMiel.jpeg'}"
           onerror="this.src='Assets/Img/Avatares/GatoMiel.jpeg'">
      <div class="chat-top-info">
        <div class="chat-top-name">${data.nombreUsuario || "Usuario"}</div>
        <div class="chat-top-email">${data.email || ""}</div>
      </div>
      <div class="chat-acciones">
        ${cerrado
          ? `<button class="btn-accion btn-reabrir-chat" onclick="cambiarEstadoChat('abierto')">↩ Reabrir</button>`
          : `<button class="btn-accion btn-cerrar-chat" onclick="cambiarEstadoChat('cerrado')">✕ Cerrar chat</button>`
        }
      </div>
    </div>

    <div id="admin-messages"></div>

    <!-- Emoji picker admin -->
    <div id="admin-emoji-picker" class="admin-emoji-picker">
      <div class="emoji-picker-title">🐱 Gato Miel</div>
      <div class="emoji-grid">
        <span class="emoji-section-label">Gatitos</span>
        <button class="emoji-btn" onclick="insertEmojiAdmin('🐱')">🐱</button>
        <button class="emoji-btn" onclick="insertEmojiAdmin('🐈')">🐈</button>
        <button class="emoji-btn" onclick="insertEmojiAdmin('🐈‍⬛')">🐈‍⬛</button>
        <button class="emoji-btn" onclick="insertEmojiAdmin('😺')">😺</button>
        <button class="emoji-btn" onclick="insertEmojiAdmin('😸')">😸</button>
        <button class="emoji-btn" onclick="insertEmojiAdmin('😻')">😻</button>

  // Escuchar mensajes
  if (unsubMensajes) unsubMensajes();
  const q = query(
    collection(db, "chats", uid, "mensajes"),
    orderBy("fecha", "asc")
  );
  unsubMensajes = onSnapshot(q, (snap) => {
    const container = document.getElementById("admin-messages");
    if (!container) return;
    container.innerHTML = "";

    if (snap.empty) {
      container.innerHTML = `<div style="text-align:center;padding:30px;color:#bbb;font-size:13px;">Sin mensajes aún</div>`;
      return;
    }

    snap.forEach(docSnap => {
      const m = docSnap.data();
      const esAdmin = m.rol === "admin";
      const esBot   = m.rol === "bot";
      const fecha = m.fecha?.toDate
        ? m.fecha.toDate().toLocaleTimeString("es-PE", { hour: "2-digit", minute: "2-digit" })
        : "";
      const div = document.createElement("div");
      div.className = `chat-msg ${esBot ? "bot-msg" : esAdmin ? "admin" : "usuario"}`;

      if (m.tipo === "imagen") {
        div.innerHTML = `<img src="${m.url}" style="max-width:100%;border-radius:10px;cursor:pointer;max-height:200px;object-fit:cover;display:block;margin-bottom:4px;" onclick="window.open('${m.url}','_blank')"><span class="chat-msg-meta">${esAdmin ? "Tú" : m.nombre} · ${fecha}</span>`;
      } else if (m.tipo === "audio") {
        div.innerHTML = `<audio controls src="${m.url}" style="max-width:220px;border-radius:8px;"></audio><span class="chat-msg-meta">${esAdmin ? "Tú" : m.nombre} · ${fecha}</span>`;
      } else {
        div.innerHTML = `${m.texto}<span class="chat-msg-meta">${esAdmin ? "Tú" : m.nombre} · ${fecha}</span>`;
      }

      container.appendChild(div);
    });

    container.scrollTop = container.scrollHeight;
  });
}

// ── Cerrar / reabrir chat ────────────────────────────────────────────
window.cambiarEstadoChat = async function(nuevoEstado) {
  if (!salaActiva) return;

  if (nuevoEstado === "cerrado") {
    // Solo envía mensaje de despedida, no bloquea el chat
    await addDoc(collection(db, "chats", salaActiva, "mensajes"), {
      texto: "Parece que te fuiste 😊 No te preocupes, aquí estaremos cuando nos necesites 🐾",
      rol: "bot", nombre: "Gato Miel Bot",
      fecha: serverTimestamp(), leido: false, tipo: "texto"
    });
    await updateDoc(doc(db, "chats", salaActiva), {
      estado: "cerrado",
      ultimaFecha: serverTimestamp(),
      noLeidosAdmin: false
    });
  } else {
    const abiertosCount = todasLasSalas.filter(s => s.estado !== "cerrado").length;
    if (abiertosCount >= MAX_CHATS_ABIERTOS) {
      const aviso = document.getElementById("limite-aviso");
      aviso.style.display = "block";
      setTimeout(() => aviso.style.display = "none", 4000);
      return;
    }
    await updateDoc(doc(db, "chats", salaActiva), { estado: "abierto" });
  }

  const salaActualizada = { ...salaActivaData, estado: nuevoEstado };
  salaActivaData = salaActualizada;
  abrirConversacion(salaActiva, salaActualizada);
};

// ── Enviar respuesta ─────────────────────────────────────────────────
window.enviarRespuesta = async function() {
  if (!salaActiva) return;

  // Si hay imagen, convertir a base64 y enviar
  if (_archivoAdmin) {
    const archivo = _archivoAdmin;
    window.cancelarArchivoAdmin();
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(archivo);
    });
    await addDoc(collection(db, "chats", salaActiva, "mensajes"), {
      url: base64, rol: "admin", nombre: "Gato Miel",
      fecha: serverTimestamp(), leido: false, tipo: "imagen"
    });
    await updateDoc(doc(db, "chats", salaActiva), {
      ultimoMensaje: "Tú: 🖼 Imagen",
      ultimaFecha: serverTimestamp(), noLeidosAdmin: false,
      ultimoMensajeAdmin: new Date().toISOString()
    });
    _iniciarTimerInactividad(salaActiva);
    return;
  }

  const input = document.getElementById("admin-input");
  if (!input) return;
  const texto = input.value.trim();
  if (!texto) return;

  input.value = "";
  input.style.height = "auto";

  await addDoc(collection(db, "chats", salaActiva, "mensajes"), {
    texto, rol: "admin", nombre: "Gato Miel",
    fecha: serverTimestamp(), leido: false, tipo: "texto"
  });

  await updateDoc(doc(db, "chats", salaActiva), {
    ultimoMensaje: `Tú: ${texto}`,
    ultimaFecha: serverTimestamp(),
    noLeidosAdmin: false,
    ultimoMensajeAdmin: new Date().toISOString()
  });

  _iniciarTimerInactividad(salaActiva);
};

// ── Timer inactividad ─────────────────────────────────────────────────
const _timers = {};

function _iniciarTimerInactividad(uid) {
  // Cancelar timer anterior si existe
  if (_timers[uid]) clearTimeout(_timers[uid]);

  _timers[uid] = setTimeout(async () => {
    // Verificar si el usuario respondió algo después del mensaje del admin
    const q = query(
      collection(db, "chats", uid, "mensajes"),
      orderBy("fecha", "desc")
    );
    const snap = await getDocs(q);
    const msgs = snap.docs.map(d => d.data());
    const ultimoMsg = msgs[0];

      // Si el último mensaje sigue siendo del admin o bot → enviar despedida
      if (!ultimoMsg || ultimoMsg.rol !== "usuario") {
        await addDoc(collection(db, "chats", uid, "mensajes"), {
          texto: "Parece que te fuiste 😊 No te preocupes, aquí estaremos cuando nos necesites 🐾",
          rol: "bot", nombre: "Gato Miel Bot",
          fecha: serverTimestamp(), leido: false, tipo: "texto"
        });
        // Marca como cerrado en sidebar pero NO bloquea el chat
        await updateDoc(doc(db, "chats", uid), {
          estado: "cerrado",
          ultimaFecha: serverTimestamp(),
          noLeidosAdmin: false
        });
      }

    delete _timers[uid];
  }, 5 * 60 * 1000); // 5 minutos
}

// ── Emoji picker admin ────────────────────────────────────────────────
window.toggleEmojiAdmin = function(e) {
  e.stopPropagation();
  const picker = document.getElementById("admin-emoji-picker");
  if (!picker) return;
  if (picker.classList.contains("visible")) {
    picker.classList.remove("visible");
    return;
  }
  const btn  = e.currentTarget;
  const rect = btn.getBoundingClientRect();
  const pw   = 290;
  const left = Math.max(8, Math.min(rect.left, window.innerWidth - pw - 8));
  picker.style.left   = left + "px";
  picker.style.bottom = (window.innerHeight - rect.top + 6) + "px";
  picker.classList.add("visible");
};

window.insertEmojiAdmin = function(emoji) {
  const input = document.getElementById("admin-input");
  if (!input) return;
  const start = input.selectionStart;
  const end   = input.selectionEnd;
  input.value = input.value.slice(0, start) + emoji + input.value.slice(end);
  input.selectionStart = input.selectionEnd = start + emoji.length;
  input.focus();
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
};

document.addEventListener("click", () => {
  const picker = document.getElementById("admin-emoji-picker");
  if (picker) picker.classList.remove("visible");
});

// ── Archivo seleccionado admin ────────────────────────────────────────
let _archivoAdmin = null;

document.getElementById("admin-file-input").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  _archivoAdmin = file;
  const preview = document.getElementById("admin-preview");
  const img = document.getElementById("admin-preview-img");
  const name = document.getElementById("admin-preview-name");
  if (preview) {
    img.src = URL.createObjectURL(file);
    img.style.display = "block";
    name.textContent = file.name;
    preview.style.display = "flex";
  }
  e.target.value = "";
});

window.cancelarArchivoAdmin = function() {
  _archivoAdmin = null;
  const preview = document.getElementById("admin-preview");
  if (preview) {
    preview.style.display = "none";
    document.getElementById("admin-preview-img").src = "";
    document.getElementById("admin-preview-name").textContent = "";
  }
};


</script>
