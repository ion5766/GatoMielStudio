<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#c48a3a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes"
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gato Miel">
<link rel="apple-touch-icon" href="Assets/Img/Logo.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin | Gato Miel Estudio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #f3ece3;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.admin-header {
  background: #1a1714;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.admin-header-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  color: white;
  font-weight: 500;
}
.admin-header-sub {
  font-size: 11px;
  color: #c48a3a;
  margin-top: 2px;
}
.btn-salir {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7);
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: 0.2s;
}
.btn-salir:hover { background: rgba(255,255,255,0.15); color: white; }

/* ── TABS ── */
.tabs-bar {
  background: white;
  border-bottom: 1px solid #f0ebe4;
  padding: 0 20px;
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.tab-btn {
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  color: #aaa;
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: 0.2s;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.tab-btn:hover { color: #555; }
.tab-btn.activo { color: #c48a3a; border-bottom-color: #c48a3a; }
.tab-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px; height: 16px;
  background: #e74c3c;
  color: white;
  border-radius: 50%;
  font-size: 9px;
  margin-left: 6px;
  font-weight: 700;
}

/* ── LAYOUT PRINCIPAL ── */
.admin-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 270px;
  background: white;
  border-right: 1px solid #f0ebe4;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-section {
  padding: 12px 16px 8px;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #bbb;
  font-weight: 400;
  border-bottom: 1px solid #faf7f4;
}
.sidebar-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #f0ebe4 transparent;
}

/* Item conversación */
.user-item {
  padding: 12px 14px;
  cursor: pointer;
  border-bottom: 1px solid #faf7f4;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background 0.15s;
  position: relative;
}
.user-item:hover { background: #fdf8f3; }
.user-item.activo { background: #fdf6ec; border-left: 3px solid #c48a3a; padding-left: 11px; }
.user-item.cerrado { opacity: 0.45; }

.user-item img {
  width: 38px; height: 38px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.user-item-info { flex: 1; overflow: hidden; }
.user-item-name {
  font-size: 13px;
  font-weight: 500;
  color: #1a1714;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.user-item-preview {
  font-size: 11px;
  color: #aaa;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}
.user-item-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}
.unread-dot {
  width: 9px; height: 9px;
  background: #e74c3c;
  border-radius: 50%;
}
.estado-tag {
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 500;
  letter-spacing: 0.04em;
}
.estado-tag.abierto { background: #e8f5e9; color: #2e7d32; }
.estado-tag.cerrado { background: #f5f5f5; color: #999; }

.sidebar-empty {
  padding: 30px 16px;
  text-align: center;
  color: #bbb;
  font-size: 12px;
  line-height: 1.7;
}

/* ── CHAT AREA ── */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.chat-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: #bbb;
  font-size: 13px;
  text-align: center;
  line-height: 1.6;
}
.chat-placeholder span { font-size: 44px; }

/* Chat top bar */
.chat-top {
  padding: 12px 18px;
  background: white;
  border-bottom: 1px solid #f0ebe4;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.chat-top img {
  width: 36px; height: 36px;
  border-radius: 50%;
  object-fit: cover;
}
.chat-top-info { flex: 1; }
.chat-top-name { font-size: 14px; font-weight: 500; color: #1a1714; }
.chat-top-email { font-size: 11px; color: #aaa; margin-top: 1px; }

/* Botones acción */
.chat-acciones {
  display: flex;
  gap: 8px;
}
.btn-accion {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: 0.2s;
  letter-spacing: 0.04em;
  border: none;
}
.btn-cerrar-chat {
  background: #fff0f0;
  color: #e74c3c;
  border: 1px solid #ffd5d5;
}
.btn-cerrar-chat:hover { background: #ffe0e0; }
.btn-reabrir-chat {
  background: #f0fdf0;
  color: #2e7d32;
  border: 1px solid #c8e6c9;
}
.btn-reabrir-chat:hover { background: #e0f7e0; }

/* ── Timer de inactividad ── */
#timer-container {
  display: flex; align-items: center; gap: 8px;
  background: #fdf8f2; border: 1px solid #f0e4cc;
  border-radius: 20px; padding: 4px 12px 4px 10px;
}
#timer-bar-wrap {
  width: 60px; height: 5px; background: #f0ebe4;
  border-radius: 10px; overflow: hidden;
}
#timer-bar {
  height: 100%; border-radius: 10px;
  background: #c48a3a;
  transition: width 1s linear, background 0.5s;
}
#timer-label {
  font-family: 'Inter', sans-serif; font-size: 12px;
  font-weight: 600; color: #c48a3a; min-width: 32px;
  font-variant-numeric: tabular-nums;
}

/* ── Etiqueta de quién escribió (admin) ── */
.admin-msg-label {
  font-family: 'Inter', sans-serif; font-size: 10px;
  color: #c48a3a; letter-spacing: 0.05em;
  text-align: right; padding: 6px 4px 2px;
  opacity: 0.7;
}

/* ── Tag admin en sidebar ── */
.tag-admin-resp {
  display: inline-block;
  background: #fdf0dd; color: #c48a3a;
  font-size: 9px; font-weight: 600;
  padding: 1px 6px; border-radius: 8px;
  letter-spacing: 0.04em; margin-left: 4px;
  vertical-align: middle;
}

/* Aviso chat cerrado */
.chat-cerrado-aviso {
  background: #faf7f4;
  border-top: 1px solid #f0ebe4;
  padding: 12px 18px;
  text-align: center;
  font-size: 12px;
  color: #aaa;
  font-style: italic;
}

/* Mensajes */
#admin-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: #faf7f4;
  scrollbar-width: thin;
  scrollbar-color: #f0ebe4 transparent;
}

.chat-msg {
  max-width: 72%;
  padding: 9px 13px;
  border-radius: 14px;
  font-size: 13px;
  line-height: 1.55;
  word-break: break-word;
}
.chat-msg.usuario {
  align-self: flex-start;
  background: white;
  color: #1a1714;
  border: 1px solid #f0ebe4;
  border-bottom-left-radius: 4px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}
.chat-msg.admin {
  align-self: flex-end;
  background: #1a1714;
  color: white;
  border-bottom-right-radius: 4px;
}
.chat-msg-meta {
  font-size: 10px;
  opacity: 0.4;
  margin-top: 3px;
  display: block;
}
.chat-msg.usuario .chat-msg-meta { text-align: left; }
.chat-msg.admin .chat-msg-meta { text-align: right; }

.chat-msg.bot-msg {
  align-self: flex-start;
  background: #fdf6ec;
  color: #c48a3a;
  border: 1px solid #f0e0b8;
  border-bottom-left-radius: 4px;
  font-style: italic;
  font-size: 12px;
}

/* Footer input */
.chat-bottom {
  padding: 10px 14px;
  border-top: 1px solid #f0ebe4;
  background: white;
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
#admin-input {
  flex: 1;
  border: 1.5px solid #f0ebe4;
  border-radius: 20px;
  padding: 9px 14px;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  resize: none;
  outline: none;
  max-height: 80px;
  overflow-y: auto;
  transition: border-color 0.2s;
  line-height: 1.4;
}
#admin-input:focus { border-color: #c48a3a; }
.btn-enviar-admin {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: #c48a3a;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, transform 0.2s;
}
.btn-enviar-admin:hover { background: #a8742f; transform: scale(1.08); }

/* Límite de chats */
.limite-aviso {
  background: #fff8e1;
  border: 1px solid #ffe082;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: #795548;
  margin: 10px 14px 0;
  display: none;
}

/* Botones adjuntar */
.admin-attach-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: #f0ebe4; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.2s;
  font-size: 17px; line-height: 1;
}
.admin-attach-btn:hover, .admin-attach-btn:active { background: #e3d9cc; }
.admin-attach-btn.grabando { background: #e74c3c !important; animation: pulseRec 1s infinite; }
@keyframes pulseRec { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

.mu-back-chat-btn {
  display: none;
  width: 34px; height: 34px; border-radius: 50%;
  background: #f0ebe4; border: none; cursor: pointer;
  align-items: center; justify-content: center;
  flex-shrink: 0; color: #1a1714; transition: background 0.2s;
}
.mu-back-chat-btn:hover { background: #e3d9cc; }
@media (max-width: 768px) {
  .mu-back-chat-btn { display: flex !important; }
  .chat-top-email { display: none; }
  .btn-cerrar-chat, .btn-reabrir-chat { padding: 5px 10px; font-size: 10px; }
}

/* Preview archivo admin */
.admin-preview {
  padding: 8px 14px; background: #f8f5f1;
  border-top: 1px solid #f0ebe4;
  display: none; align-items: center; gap: 8px;
}
.admin-preview img {
  width: 38px; height: 38px; border-radius: 8px; object-fit: cover;
}
.admin-preview-name {
  flex: 1; font-size: 12px; color: #666;
  font-family: 'Inter', sans-serif;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.admin-preview-cancel {
  background: none; border: none; color: #aaa;
  font-size: 16px; cursor: pointer; padding: 0;
}
.admin-preview-cancel:hover { color: #e74c3c; }
/* Emoji picker admin */
.admin-emoji-picker {
  position: absolute;
  bottom: 62px; left: 14px;
  background: white;
  border: 1px solid #f0ebe4;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.13);
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 6px;
  z-index: 9999;
  width: 290px;
}
.admin-emoji-picker.visible { display: flex; }
.emoji-picker-title {
  font-family: 'Playfair Display', serif;
  font-size: 11px; color: #c48a3a;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 2px 4px 4px;
  border-bottom: 1px solid #f5f0ea;
}
.emoji-grid { display: flex; flex-wrap: wrap; gap: 2px; }
.emoji-btn {
  width: 34px; height: 34px;
  background: none; border: none; border-radius: 8px;
  cursor: pointer; font-size: 20px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.emoji-btn:hover { background: #f5f0ea; }
.emoji-section-label {
  font-size: 10px; color: #bbb;
  font-family: 'Inter', sans-serif;
  width: 100%; padding: 4px 2px 1px;
  letter-spacing: 0.05em;
}
</style>

<!-- Inputs ocultos para el admin -->
<input type="file" id="admin-file-input" accept="image/*" style="display:none">
<input type="file" id="admin-audio-input" accept="audio/*" style="display:none">

<style>
#sin-acceso {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  text-align: center;
  padding: 40px;
}
#sin-acceso h2 {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 500;
  color: #1a1714;
}
#sin-acceso p { font-size: 14px; color: #888; line-height: 1.7; }
#sin-acceso a { font-size: 14px; color: #c48a3a; font-weight: 500; text-decoration: none; }
</style>
</style>
  
</head>
<body>

<!-- Sin acceso -->
<div id="sin-acceso">
  <span style="font-size:44px;">🔒</span>
  <h2>Verificando acceso...</h2>
  <p>Un momento por favor.</p>
</div>

<!-- Panel -->
<div id="panel" style="display:none; flex-direction:column; height:100vh;">

  <div class="admin-header">
    <div style="display:flex;align-items:center;gap:14px;">
      <a href="index.html" style="
        display:flex;align-items:center;gap:6px;
        color:rgba(255,255,255,0.5);text-decoration:none;
        font-size:12px;font-family:'Inter',sans-serif;
        transition:color 0.2s;
      " onmouseover="this.style.color='#c48a3a'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Inicio
      </a>
      <div>
        <div class="admin-header-title">Panel de mensajes</div>
        <div class="admin-header-sub">Gato Miel Estudio</div>
      </div>
    </div>
    <button class="btn-salir" onclick="cerrarSesionAdmin()">Cerrar sesión</button>
  </div>

  <!-- Tabs -->
  <div class="tabs-bar">
    <button class="tab-btn activo" onclick="cambiarTab('abiertos', this)">
      Abiertos <span id="badge-abiertos" class="tab-badge" style="display:none"></span>
    </button>
    <button class="tab-btn" onclick="cambiarTab('cerrados', this)">
      Cerrados
    </button>
    <button class="tab-btn" onclick="cambiarTab('todos', this)">
      Todos
    </button>
  </div>

  <!-- Aviso límite -->
  <div class="limite-aviso" id="limite-aviso">
    ⚠️ Tienes 4 chats abiertos. Cierra uno antes de reabrir otro.
  </div>

  <div class="admin-body">

    <div class="sidebar">
      <div class="sidebar-list" id="sidebar-list">
        <div class="sidebar-empty">Cargando conversaciones...</div>
      </div>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="chat-placeholder" id="chat-placeholder">
        <span>💬</span>
        <p>Selecciona una conversación<br>para responder</p>
      </div>
    </div>

  </div>
</div>


<script type="module">

import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc,
  query, orderBy, where, onSnapshot,
  doc, updateDoc, setDoc, getDoc, getDocs,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const ADMIN_EMAILS = ["jhonanibal576@gmail.com", "gatomielstudio@gmail.com"];
const MAX_CHATS_ABIERTOS = 4;
const MSG_AVISO     = "¿Sigues ahí? 🐾";
const MSG_DESPEDIDA = "Parece que te fuiste 😊 No te preocupes, aquí estaremos cuando nos necesites 🐾";
const TIMER_TOTAL   = 5 * 60 * 1000;  // 5 min
const TIMER_AVISO   = 3 * 60 * 1000;  // 3 min → mensaje ¿Sigues ahí?

const firebaseConfig = {
  apiKey:"AIzaSyBiJkhAd08hv_fjqGMYOvr-vYXudlj5aSs",
  authDomain:"gato-miel-estudio.firebaseapp.com",
  projectId:"gato-miel-estudio",
  storageBucket:"gato-miel-estudio.firebasestorage.app",
  messagingSenderId:"150671559458",
  appId:"1:150671559458:web:6daaf4a78150706db0337b"
};

const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let salaActiva     = null;
let salaActivaData = null;
let unsubMensajes  = null;
let unsubSala      = null;   // para escuchar cambios de la sala activa
let tabActual      = "abiertos";
let todasLasSalas  = [];
let adminEmail     = "";

// ── Timers por sala: { uid: { timerAviso, timerCierre, intervalo, inicio } }
const _timers = {};

// ══════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════
onAuthStateChanged(auth, (user) => {
  const sinAcceso = document.getElementById("sin-acceso");
  const panel     = document.getElementById("panel");

  if (!user) {
    sinAcceso.innerHTML = `<span style="font-size:44px">🔒</span><h2>Acceso restringido</h2><p>Inicia sesión como administradora.</p><a href="entrada.html">Iniciar sesión →</a>`;
    return;
  }
  if (!ADMIN_EMAILS.includes(user.email?.toLowerCase())) {
    sinAcceso.innerHTML = `<span style="font-size:44px">🚫</span><h2>Sin acceso</h2><p>Esta página es solo para las administradoras.</p><a href="index.html">← Volver al inicio</a>`;
    return;
  }
  adminEmail = user.email?.toLowerCase();
  sinAcceso.style.display = "none";
  panel.style.display     = "flex";
  cargarConversaciones();
});

// ══════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════
function cargarConversaciones() {
  const q = query(collection(db,"chats"), orderBy("ultimaFecha","desc"));
  onSnapshot(q, snap => {
    todasLasSalas = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderSidebar();
    actualizarBadges();
  });
}

function renderSidebar() {
  const lista = document.getElementById("sidebar-list");
  let filtradas = todasLasSalas;
  if (tabActual === "abiertos") filtradas = todasLasSalas.filter(s => s.estado !== "cerrado");
  if (tabActual === "cerrados") filtradas = todasLasSalas.filter(s => s.estado === "cerrado");

  if (!filtradas.length) {
    lista.innerHTML = `<div class="sidebar-empty">${tabActual==="abiertos"?"No hay chats abiertos 🐱":tabActual==="cerrados"?"No hay chats cerrados":"Sin conversaciones"}</div>`;
    return;
  }
  lista.innerHTML = "";
  filtradas.forEach(sala => {
    const cerrado = sala.estado === "cerrado";
    const div = document.createElement("div");
    div.className = `user-item${salaActiva===sala.id?" activo":""}${cerrado?" cerrado":""}`;
    div.onclick = () => abrirConversacion(sala.id, sala);

    // Etiqueta: quién respondió por última vez (admin)
    const ultimoAdmin = sala.ultimoAdmin
      ? `<span class="tag-admin-resp" title="${sala.ultimoAdmin}">${sala.ultimoAdmin === "jhonanibal576@gmail.com" ? "Jhon" : "GatoMiel"}</span>`
      : "";

    div.innerHTML = `
      <img src="${sala.avatar||'Assets/Img/Avatares/GatoMiel.jpeg'}" onerror="this.src='Assets/Img/Avatares/GatoMiel.jpeg'">
      <div class="user-item-info">
        <div class="user-item-name">${sala.nombreUsuario||sala.email||"Usuario"} ${ultimoAdmin}</div>

      const esBot   = m.rol === "bot";

        div.innerHTML = `${m.texto}<span class="chat-msg-meta">${esAdmin?"Tú":m.nombre} · ${hora}</span>`;
      }
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;

    // Si el cliente responde → pausar/cancelar timer de esta sala
    const msgs = snap.docs.map(d => d.data());
    const ultimo = msgs[msgs.length - 1];
    if (ultimo?.rol === "usuario") {
      _cancelarTimer(uid);
      _ocultarTimer();
    }
  });

  // Escuchar estado de sala para actualizar botón cerrar/reabrir en tiempo real
  unsubSala = onSnapshot(doc(db,"chats",uid), snap => {
    if (!snap.exists()) return;
    const d = snap.data();
    salaActivaData = { id: uid, ...d };
    const cerrado = d.estado === "cerrado";
    const acciones = document.querySelector(".chat-acciones");
    if (!acciones) return;
    const btnExistente = acciones.querySelector(".btn-cerrar-chat, .btn-reabrir-chat");

    }
    if (cerrado) { _cancelarTimer(uid); _ocultarTimer(); }
  });

  // Si hay timer activo para esta sala, mostrar el countdown
  if (_timers[uid]?.intervalo) _mostrarTimer(uid);
}

window.enviarRespuesta = async function() {

  if (_archivoAdmin) {
    const archivo = _archivoAdmin;
    window.cancelarArchivoAdmin();
    const base64 = await new Promise((res,rej) => {
      const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej;
      r.readAsDataURL(archivo);
    });
    await addDoc(collection(db,"chats",salaActiva,"mensajes"), {
      url:base64, rol:"admin", adminEmail, nombre:"Gato Miel",
      fecha:serverTimestamp(), leido:false, tipo:"imagen"
    });
    await updateDoc(doc(db,"chats",salaActiva), {
      ultimoMensaje:"Tú: 🖼 Imagen", ultimaFecha:serverTimestamp(),
      noLeidosAdmin:false, ultimoAdmin:adminEmail
    });
    _iniciarTimer(salaActiva);
    return;
  }

  const input = document.getElementById("admin-input");
  if (!input) return;
  const texto = input.value.trim();
  if (!texto) return;
  input.value = ""; input.style.height = "auto";

  await addDoc(collection(db,"chats",salaActiva,"mensajes"), {
    texto, rol:"admin", adminEmail, nombre:"Gato Miel",
    fecha:serverTimestamp(), leido:false, tipo:"texto"
  });
  await updateDoc(doc(db,"chats",salaActiva), {
    ultimoMensaje:`Tú: ${texto}`, ultimaFecha:serverTimestamp(),
    noLeidosAdmin:false, ultimoAdmin:adminEmail
  });

  _iniciarTimer(salaActiva);
};

window.cambiarEstadoChat = async function(nuevoEstado) {
  if (!salaActiva) return;

  if (nuevoEstado === "cerrado") {
    // Cierre MANUAL → NO enviar bot de despedida (el admin ya se despidió)
    _cancelarTimer(salaActiva);
    _ocultarTimer();
    await updateDoc(doc(db,"chats",salaActiva), {
      estado:"cerrado", ultimaFecha:serverTimestamp(), noLeidosAdmin:false
    });
  } else {
    const abiertos = todasLasSalas.filter(s => s.estado !== "cerrado").length;
    if (abiertos >= MAX_CHATS_ABIERTOS) {
      const aviso = document.getElementById("limite-aviso");
      aviso.style.display = "block";
      setTimeout(() => aviso.style.display = "none", 4000);
      return;
    }
    await updateDoc(doc(db,"chats",salaActiva), { estado:"abierto" });
  }
};

// ══════════════════════════════════════════
//  TIMER DE INACTIVIDAD (5 min)
//  Solo visible para el admin en la sala activa
// ══════════════════════════════════════════
function _iniciarTimer(uid) {
  _cancelarTimer(uid); // reiniciar si ya había uno

  const inicio = Date.now();
  let avisoEnviado = false;

  // Intervalo que actualiza la barra cada segundo
  const intervalo = setInterval(() => {
    const elapsed = Date.now() - inicio;
    const restante = TIMER_TOTAL - elapsed;

    if (restante <= 0) { clearInterval(intervalo); return; }

    // Mostrar timer solo si esta sala está activa
    if (salaActiva === uid) _actualizarTimer(restante, TIMER_TOTAL);

    // A los 3 min → enviar "¿Sigues ahí?"
    if (!avisoEnviado && elapsed >= TIMER_AVISO) {
      avisoEnviado = true;
      addDoc(collection(db,"chats",uid,"mensajes"), {
        texto:MSG_AVISO, rol:"bot", nombre:"Gato Miel Bot",
        fecha:serverTimestamp(), leido:false, tipo:"texto"
      });
    }
  }, 1000);

  // A los 5 min → cerrar y enviar despedida
  const timerCierre = setTimeout(async () => {
    clearInterval(intervalo);
    if (_timers[uid]) delete _timers[uid];
    if (salaActiva === uid) _ocultarTimer();

    // Verificar que el último mensaje siga siendo del admin (no respondió)
    const snap = await getDocs(query(collection(db,"chats",uid,"mensajes"), orderBy("fecha","desc")));
    const ultimo = snap.docs[0]?.data();
    if (ultimo && ultimo.rol === "usuario") return; // cliente respondió, no cerrar

    await addDoc(collection(db,"chats",uid,"mensajes"), {
      texto:MSG_DESPEDIDA, rol:"bot", nombre:"Gato Miel Bot",
      fecha:serverTimestamp(), leido:false, tipo:"texto"
    });
    await updateDoc(doc(db,"chats",uid), {
      estado:"cerrado", ultimaFecha:serverTimestamp(), noLeidosAdmin:false
    });
  }, TIMER_TOTAL);

  _timers[uid] = { intervalo, timerCierre, inicio };

  // Mostrar timer si la sala activa es esta
  if (salaActiva === uid) {
    const tc = document.getElementById("timer-container");
    if (tc) tc.style.display = "flex";
  }
}

function _cancelarTimer(uid) {
  if (!_timers[uid]) return;
  clearInterval(_timers[uid].intervalo);
  clearTimeout(_timers[uid].timerCierre);
  delete _timers[uid];
}

function _mostrarTimer(uid) {
  const tc = document.getElementById("timer-container");
  if (!tc || !_timers[uid]) return;
  tc.style.display = "flex";
  const elapsed  = Date.now() - _timers[uid].inicio;
  const restante = TIMER_TOTAL - elapsed;
  _actualizarTimer(restante, TIMER_TOTAL);
}

function _ocultarTimer() {
  const tc = document.getElementById("timer-container");
  if (tc) tc.style.display = "none";
}

function _actualizarTimer(restante, total) {
  const label = document.getElementById("timer-label");
  const bar   = document.getElementById("timer-bar");
  if (!label || !bar) return;
  const seg   = Math.ceil(restante / 1000);
  const min   = Math.floor(seg / 60);
  const s     = seg % 60;
  label.textContent = `${min}:${String(s).padStart(2,"0")}`;
  const pct = (restante / total) * 100;
  bar.style.width   = pct + "%";
  bar.style.background = pct > 50 ? "#c48a3a" : pct > 20 ? "#e8a020" : "#e55";
}

    if (!html) html = "<div class='pp-empty'>Sin datos de contacto adicionales</div>";
    document.getElementById("pp-body").innerHTML = html;
    const tel = cel.replace(/[^0-9]/g,"");
    if (tel) { const w=document.getElementById("pp-wsp-link"); w.href="https://wa.me/"+tel+"?text="+encodeURIComponent("Hola "+nom+" Te escribimos desde Gato Miel Estudio"); w.style.display="flex"; }
  } catch(e) { document.getElementById("pp-body").innerHTML="<div class='pp-empty'>Sin datos adicionales</div>"; }
