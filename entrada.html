<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenido | Gato Miel Estudio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Inter',sans-serif; overflow:hidden; }
.video-bg{ position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-2; }
.overlay{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.55); z-index:-1; }
.contenido{ height:100vh; display:none; flex-direction:column; justify-content:center; align-items:center; text-align:center; color:white; padding:20px; }
.logo{ font-family:'Playfair Display',serif; font-size:clamp(32px,6vw,52px); margin-bottom:6px; letter-spacing:2px; }
.sub{ opacity:0.7; font-size:14px; margin-bottom:28px; }
.card{ background:rgba(255,255,255,0.07); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.15); border-radius:22px; padding:32px 28px 28px; width:100%; max-width:340px; display:flex; flex-direction:column; gap:12px; }
input{ padding:13px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.1); color:white; font-size:14px; font-family:'Inter',sans-serif; outline:none; transition:.2s; width:100%; }
input::placeholder{ color:rgba(255,255,255,0.45); }
input:focus{ border-color:#c48a3a; background:rgba(255,255,255,0.15); }
.btn{ padding:13px 20px; border:none; border-radius:10px; font-size:14px; font-family:'Inter',sans-serif; font-weight:500; cursor:pointer; transition:.25s; width:100%; }
.btn-primary{ background:#c48a3a; color:white; }
.btn-primary:hover{ background:#a8742f; }
.btn-secondary{ background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); }
.btn-secondary:hover{ background:rgba(255,255,255,0.2); }
.btn-google{ background:#4285F4; color:white; display:flex; align-items:center; justify-content:center; gap:10px; }
.btn-google:hover{ background:#3367D6; }
.btn-guest{ background:transparent; border:1px solid rgba(255,255,255,0.22); color:rgba(255,255,255,0.6); font-size:13px; }
.btn-guest:hover{ background:rgba(255,255,255,0.07); color:white; }
.divider{ display:flex; align-items:center; gap:10px; color:rgba(255,255,255,0.28); font-size:11px; }
.divider::before,.divider::after{ content:''; flex:1; height:1px; background:rgba(255,255,255,0.13); }
#msg{ font-size:12px; min-height:16px; font-family:'Inter',sans-serif; }
#spinner{ position:fixed; inset:0; background:rgba(8,6,4,0.75); z-index:999; display:flex; align-items:center; justify-content:center; }
.ring{ width:40px; height:40px; border:3px solid rgba(255,255,255,0.12); border-top-color:#c48a3a; border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<video autoplay muted loop playsinline class="video-bg">
  <source src="Assets/Video/VideoPresentacion.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div id="spinner"><div class="ring"></div></div>

<div class="contenido" id="contenido">
  <div class="logo">Gato Miel Estudio</div>
  <p class="sub">Arte cerámico hecho a mano</p>
  <div class="card">
    <input id="email" type="email" placeholder="Correo electrónico" autocomplete="email">
    <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password">
    <p id="msg" style="color:#f8d978;text-align:center;"></p>
    <button class="btn btn-primary" onclick="login()">Iniciar sesión</button>
    <button class="btn btn-secondary" onclick="registrarse()">Crear cuenta</button>
    <div class="divider">o</div>
    <button class="btn btn-google" onclick="loginGoogle()">
      <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#FFF" d="M44.5 20H24v8.5h11.7C34.1 33.7 29.6 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 6 1.1 8.1 3l6-6C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.8 0 20-7.8 20-21 0-1.4-.1-2.7-.5-4z"/></svg>
      Entrar con Google
    </button>
    <button class="btn btn-guest" onclick="entrarInvitado()">Explorar como invitado 🐾</button>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged,
  createUserWithEmailAndPassword, signInWithEmailAndPassword,
  GoogleAuthProvider, signInWithPopup,
  signOut, sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const fc = {
  apiKey:"AIzaSyBiJkhAd08hv_fjqGMYOvr-vYXudlj5aSs",
  authDomain:"gato-miel-estudio.firebaseapp.com",
  projectId:"gato-miel-estudio",
  storageBucket:"gato-miel-estudio.firebasestorage.app",
  messagingSenderId:"150671559458",
  appId:"1:150671559458:web:6daaf4a78150706db0337b"
};
const app  = getApps().length ? getApps()[0] : initializeApp(fc);
const auth = getAuth(app);

const spinner   = document.getElementById("spinner");
const contenido = document.getElementById("contenido");
const msg       = document.getElementById("msg");
let   _going    = false; // flag para no disparar doble redirect

function showMsg(t, c="#f8d978"){ msg.style.color=c; msg.textContent=t; }

// ─── Verificar sesión activa al cargar ───────────────────────────────────
// Se ejecuta solo UNA vez. Si ya tiene sesión válida → va a index.
// Si no → muestra el formulario.
const unsub = onAuthStateChanged(auth, async user => {
  unsub(); // desuscribir INMEDIATAMENTE — solo necesitamos el estado inicial
  if (user && !_going) {
    const esGoogle = user.providerData?.[0]?.providerId === "google.com";
    if (user.emailVerified || esGoogle) {
      _going = true;
      window.location.replace("index.html");
      return;
    }
    // Sesión sin verificar — cerrar y mostrar formulario con aviso
    await signOut(auth).catch(()=>{});
    showMsg("⚠️ Verifica tu correo antes de entrar.");
  }
  spinner.style.display = "none";
  contenido.style.display = "flex";
});

// ─── Login ───────────────────────────────────────────────────────────────
window.login = async () => {
  const email = document.getElementById("email").value.trim();
  const pass  = document.getElementById("password").value;
  if (!email||!pass){ showMsg("Ingresa correo y contraseña."); return; }
  showMsg("Ingresando...", "rgba(255,255,255,.5)");
  try {
    const {user} = await signInWithEmailAndPassword(auth, email, pass);
    if (!user.emailVerified) {
      await signOut(auth);
      showMsg("⚠️ Debes verificar tu correo primero.");
      return;
    }
    _going = true;
    window.location.replace("index.html");
  } catch(e){ showMsg(err(e.code)); }
};

// ─── Registro ────────────────────────────────────────────────────────────
window.registrarse = async () => {
  const email = document.getElementById("email").value.trim();
  const pass  = document.getElementById("password").value;
  if (!email||!pass){ showMsg("Ingresa correo y contraseña."); return; }
  if (pass.length<6){ showMsg("Contraseña mínimo 6 caracteres."); return; }
  showMsg("Creando cuenta...", "rgba(255,255,255,.5)");
  try {
    const {user} = await createUserWithEmailAndPassword(auth, email, pass);
    await sendEmailVerification(user);
    await signOut(auth); // no entra hasta verificar
    showMsg("✉️ Revisa tu correo (y SPAM) para verificar tu cuenta.", "#a8f0a8");
    document.getElementById("password").value = "";
  } catch(e){ showMsg(err(e.code)); }
};

// ─── Google ───────────────────────────────────────────────────────────────
window.loginGoogle = async () => {
  showMsg("Abriendo Google...", "rgba(255,255,255,.5)");
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
    _going = true;
    window.location.replace("index.html");
  } catch(e){
    showMsg(e.code==="auth/popup-closed-by-user" ? "" : err(e.code));
  }
};

// ─── Invitado — va directo a index sin sesión ─────────────────────────────
window.entrarInvitado = () => {
  _going = true;
  window.location.replace("index.html");
};

// ─── Traducir errores ─────────────────────────────────────────────────────
function err(code){
  return ({
    "auth/invalid-email":        "Correo no válido.",
    "auth/user-not-found":       "No existe cuenta con ese correo.",
    "auth/wrong-password":       "Contraseña incorrecta.",
    "auth/email-already-in-use": "Ese correo ya tiene una cuenta.",
    "auth/weak-password":        "Contraseña muy corta (mín. 6 caracteres).",
    "auth/invalid-credential":   "Correo o contraseña incorrectos.",
    "auth/too-many-requests":    "Demasiados intentos. Espera un momento.",
    "auth/network-request-failed":"Sin conexión. Revisa tu internet.",
  })[code] || "Error: "+code;
}
</script>

<script src="movil-ui.js" defer></script>
</body>
</html>
